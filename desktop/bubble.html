<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>VibeMon Speech Bubble</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent;
    overflow: hidden;
  }

  /* The tail overflows 6px above or below #bubble's own box (see
     .bubble-tail below) — without this reserved space the bubble window
     (sized to exactly fit its content) would clip it off entirely. */
  body {
    padding: 6px 0;
  }

  #bubble {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    gap: 5px;
    padding: 8px 12px;
    min-width: 160px;
    background: rgba(90, 90, 90, 0.55);
    border-radius: 10px;
    white-space: nowrap;
  }

  .bubble-row {
    display: none;
    color: #fff;
    font-size: 11px;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }

  .bubble-metric {
    align-items: center;
    gap: 6px;
  }

  .bubble-icon {
    flex: none;
    font-size: 11px;
    line-height: 1;
  }

  .bubble-bar-track {
    flex: 0 0 90px;
    height: 3px;
    background: rgba(0, 0, 0, 0.35);
    border-radius: 2px;
    overflow: hidden;
  }

  .bubble-bar-fill {
    display: block;
    height: 100%;
    width: 0%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
  }

  .bubble-value {
    flex: none;
    width: 30px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }

  .bubble-tail {
    position: absolute;
    width: 0;
    height: 0;
    transform: translateX(-50%);
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
  }

  /* Bubble above the character (usual case): tail on the bottom edge, pointing down. */
  .bubble-tail.tail-bottom {
    bottom: -6px;
    border-top: 6px solid rgba(90, 90, 90, 0.55);
  }

  /* Bubble below the character (no room above, e.g. near the top of the screen):
     tail on the top edge, pointing up. */
  .bubble-tail.tail-top {
    top: -6px;
    border-bottom: 6px solid rgba(90, 90, 90, 0.55);
  }
</style>
</head>
<body>
  <div id="bubble">
    <div class="bubble-row" data-field="project"></div>
    <div class="bubble-row bubble-metric" data-field="memory">
      <span class="bubble-icon"></span>
      <span class="bubble-bar-track"><span class="bubble-bar-fill"></span></span>
      <span class="bubble-value"></span>
    </div>
    <div class="bubble-row bubble-metric" data-field="usage5h">
      <span class="bubble-icon"></span>
      <span class="bubble-bar-track"><span class="bubble-bar-fill"></span></span>
      <span class="bubble-value"></span>
    </div>
    <div class="bubble-row bubble-metric" data-field="usageWeek">
      <span class="bubble-icon"></span>
      <span class="bubble-bar-track"><span class="bubble-bar-fill"></span></span>
      <span class="bubble-value"></span>
    </div>
    <div class="bubble-tail tail-bottom" id="bubble-tail"></div>
  </div>

  <script>
    // Same green/yellow/red thresholds as the engine's own metric bars
    // (getMemoryGradient in vibemon-engine-standalone.js), simplified to a
    // flat color per band instead of a two-stop gradient.
    function barColor(percent) {
      if (percent < 75) return '#00AA00';
      if (percent < 90) return '#FFCC00';
      return '#FF4444';
    }

    // Called from the main process via webContents.executeJavaScript().
    // `fields` is a plain object keyed by field name: { type: 'text', text }
    // for the project row, or { type: 'metric', icon, value } (0-100) for the
    // memory/usage rows, rendered as an icon + inline bar + percentage —
    // only enabled/truthy fields are present. tailX is the tail's left offset
    // in px; tailSide is 'bottom' (bubble above the character, the usual
    // case) or 'top' (bubble below it) — both computed by the main process
    // from the bubble's final position relative to the character.
    window.__setBubbleContent = function (fields, tailX, tailSide) {
      var bubble = document.getElementById('bubble');
      var rows = bubble.querySelectorAll('.bubble-row');
      for (var i = 0; i < rows.length; i++) {
        var row = rows[i];
        var data = fields[row.dataset.field];
        if (!data) {
          row.style.display = 'none';
          continue;
        }

        if (data.type === 'metric') {
          var pct = Math.max(0, Math.min(100, data.value));
          row.querySelector('.bubble-icon').textContent = data.icon;
          var fill = row.querySelector('.bubble-bar-fill');
          fill.style.width = pct + '%';
          fill.style.background = barColor(pct);
          row.querySelector('.bubble-value').textContent = pct + '%';
          row.style.display = 'flex';
        } else {
          row.textContent = data.text;
          row.style.display = 'block';
        }
      }

      var tail = document.getElementById('bubble-tail');
      if (typeof tailX === 'number') {
        tail.style.left = tailX + 'px';
      }
      if (tailSide === 'top' || tailSide === 'bottom') {
        tail.classList.toggle('tail-top', tailSide === 'top');
        tail.classList.toggle('tail-bottom', tailSide === 'bottom');
      }

      // body is a block element, so its width always reports the current
      // viewport (window) width, not its shrink-wrapped content — measure
      // width from #bubble (inline-flex, sized to content) instead. Height
      // doesn't have that problem (block height auto-sizes to content), and
      // needs to come from body to include the 6px top/bottom tail padding.
      return { width: bubble.offsetWidth, height: document.body.offsetHeight };
    };
  </script>
</body>
</html>
